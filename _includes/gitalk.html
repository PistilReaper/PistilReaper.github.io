{% if site.gitalk and site.gitalk.clientID and site.gitalk.clientSecret and site.gitalk.clientID != "YOUR_GITALK_CLIENT_ID" and site.gitalk.clientSecret != "YOUR_GITALK_CLIENT_SECRET" %}
<div class="comments">
    <div id="gitalk-container"></div>
    <script>
        function gitalkIdFromPath(pathname) {
          let hash = 0;
          for (let i = 0; i < pathname.length; i++) {
            hash = ((hash << 5) - hash) + pathname.charCodeAt(i);
            hash |= 0;
          }
          return `post-${Math.abs(hash).toString(36)}`;
        }

        const gitalk = new Gitalk({
          clientID: "{{ site.gitalk.clientID }}",
          clientSecret: "{{ site.gitalk.clientSecret }}",
          repo: "{{ site.gitalk.repo }}",
          owner: "{{ site.gitalk.owner }}",
          admin: ["{{ site.gitalk.owner }}"],
          id: gitalkIdFromPath(location.pathname),
          distractionFreeMode: false,  // Facebook-like distraction free mode
          title: "{{ page.title }}",
          language: "zh-CN"
        })
        
        gitalk.render('gitalk-container')
    </script>
</div>
{% endif %}
